name: homelab
services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 784:784/udp
      - 853:853/tcp
      - 853:853/udp
      - 10443:5443/tcp
      - 10443:5443/udp
      - 3000:3000/tcp
      - 80:80/tcp
      - 443:443/tcp
    volumes:
      - /tank/docker/adguard/data:/opt/adguardhome/work
      - /tank/docker/adguard/config:/opt/adguardhome/conf
    restart: unless-stopped
