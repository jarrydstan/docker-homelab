name: homelab
services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    networks:
      - traefik_traefiknet
    # ports:
    #   - 53:53/tcp
    #   - 53:53/udp
    #   - 784:784/udp
    #   - 853:853/tcp
    #   - 853:853/udp
      # - 3000:3000/tcp
      # - 9080:80/tcp
    volumes:
      - /tank/docker/adguard/data:/opt/adguardhome/work
      - /tank/docker/adguard/config:/opt/adguardhome/conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguard-https.rule=Host(`adguard.$DOMAINNAME_NA`)"
      - "traefik.http.routers.adguard-https.entrypoints=websecure"
      - "traefik.http.routers.adguard-https.tls=true"
      - "traefik.http.routers.adguard-https.tls.certresolver=letsencrypt"     
      - "traefik.http.routers.adguard-https.service=adguard-svc"
      - "traefik.http.services.adguard-svc.loadBalancer.server.port=443"
      # - "traefik.http.routers.adguard-http"
      # - "traefik.http.routers.adguard-http"
      # - "traefik.http.routers.adguard-http"
      # - "traefik.http.routers.adguard-http"
      # - "traefik.tcp.routers.adguard-tcp.
      # - "traefik.tcp.routers.adguard-tcp.
      # - "traefik.tcp.routers.adguard-tcp.
      # - "traefik.tcp.routers.adguard-udp.
      # - "traefik.tcp.routers.adguard-udp.
    restart: unless-stopped
networks:
  traefik_traefiknet:
    external: true
