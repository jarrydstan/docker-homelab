name: homelab
services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    network_mode: host
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 784:784/udp
      - 853:853/tcp
      - 853:853/udp
      - 5443:5443/tcp
      - 5443:5443/udp
      - 3000:3000/tcp
      - 80:80/tcp
      - 443:443/tcp
    volumes:
      - /tank/docker/adguard/data:/opt/adguardhome/work
      - /tank/docker/adguard/config:/opt/adguardhome/conf
    restart: unless-stopped
  portainer-ce:
    ports:
      - 8000:8000
      - 9443:9443
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tank/docker/portainer/data:/data
    image: portainer/portainer-ce:latest
volumes:
  portainer_data:
    external: true
    name: portainer_data
