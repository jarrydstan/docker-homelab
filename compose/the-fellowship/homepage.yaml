services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    # profiles: ["apps", "all"]
    networks:
      - socket_proxy
      - backend
      - frontend
    ports:
      - "3000:3000"
    volumes:
      - $DOCKERDIR/appdata/homepage/config:/app/config
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
