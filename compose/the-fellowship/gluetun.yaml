services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - frontend
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - "8081:8080" # Exposing qBittorrent through Docker Host LAN IP
    volumes:
      - $DOCKERDIR/appdata/gluetun:/gluetun
      - $DOCKERDIR/appdata/gluetun/forwarded_port:/tmp/gluetun/forwarded_port
    # secrets:
    #   - proton_vpn_pass
    #   - proton_vpn_user
    environment:
      TZ: $TZ
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: openvpn
      OPENVPN_USER: $PROTONVPN_USER
      OPENVPN_PASSWORD: $PROTONVPN_PASS
      SERVER_COUNTRIES: Australia
      VPN_PORT_FORWARDING: on
    labels:
      - "traefik.enable=true"
      # HTTP Routers
      - "traefik.http.routers.gluetun-qbittorrent-rtr.entrypoints=websecure"
      - "traefik.http.routers.gluetun-qbittorrent-rtr.rule=Host(`tor.local.$DOMAINNAME_NA`) || Host(`tor.$DOMAINNAME_NA`)" # qBittorrent
      # Middlewares
      - "traefik.http.routers.gluetun-qbittorrent-rtr.middlewares=chain-lan-only@file" # qBittorrent
      # HTTP Services
      - "traefik.http.routers.gluetun-qbittorrent-rtr.service=gluetun-svc" # qBittorrent
      - "traefik.http.services.gluetun-svc.loadBalancer.server.port=8080" # qBittorrent
