services:
  traefik:
    image: traefik:v3.0
    networks:
      - frontend
      - socket_proxy
    ports:
      - 8080:8080
      - 80:80
      - 443:443
      # - 53:53
    container_name: traefik
    restart: always
    command:
      # - --entrypoints.websecure.http.tls.domains[0].main=$DOMAINNAME_NA
      # - --entrypoints.websecure.http.tls.domains[0].sans=*.$DOMAINNAME_NA
      # - --entrypoints.websecure.http.tls.domains[1].main=$DOMAINNAME_J
      # - --entrypoints.websecure.http.tls.domains[1].sans=*.$DOMAINNAME_J
    environment:
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_dns_api_tokens
      - TZ=$TZ
      - DOMAINNAME_NA
      - DOMAINNAME_J
    secrets:
      - cf_dns_api_tokens
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock
      - $DOCKERDIR/appdata/traefik/config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - $DOCKERDIR/appdata/traefik/letsencrypt:/letsencrypt
      - $DOCKERDIR/appdata/traefik/rules:/rules:ro
      - $DOCKERDIR/logs/traefik.log:/log/traefik.log
    labels:
      #- "autoheal=true"
      - "traefik.enable=true"
      # HTTP Routers
      - "traefik.http.routers.traefik-rtr.entrypoints=websecure"
      - "traefik.http.routers.traefik-rtr.rule=Host(`traefik.$DOMAINNAME_NA`)"
      # Services - API
      - "traefik.http.routers.traefik-rtr.service=api@internal"
      # Healthcheck/ping
      - "traefik.http.routers.ping.rule=Host(`traefik.$DOMAINNAME_NA`) && Path(`/ping`)"
      # - "traefik.http.routers.ping.tls=true"
      - "traefik.http.routers.ping.service=ping@internal"
      # Middlewares
      - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
      # - "traefik.http.routers.traefik-rtr.middlewares=chain-no-auth@file" # For No Authentication
      #- "traefik.http.routers.traefik-rtr.middlewares=chain-basic-auth@file" # For Basic HTTP Authentication
      # - "traefik.http.routers.traefik-rtr.middlewares=chain-oauth@file" # For Google OAuth
      #- "traefik.http.routers.traefik-rtr.middlewares=chain-authelia@file" # For Authelia Authentication
