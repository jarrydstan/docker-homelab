services:
  # RustFS main service
  rustfs:
    security_opt:
      - "no-new-privileges:true"
    image: rustfs/rustfs:1.0.0-alpha.90
    container_name: rustfs-server
    env_file:
      - ~/docker-homelab/.rustfs.env
    # ports:
    #   - "9000:9000" # S3 API port
    #   - "9001:9001" # Console port
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0..3} # Define 4 storage volumes
      # - RUSTFS_TLS_PATH=/opt/tls
      # - RUSTFS_OBS_ENDPOINT=http://otel-collector:4318
    volumes:
      - $APPDIR/rustfs/deploy/data/pro:/data
      - $APPDIR/rustfs/deploy/logs:/app/logs
      # - $APPDIR/rustfs/deploy/data/certs/:/opt/tls # TLS configuration, you should create tls directory and put your tls files in it and then specify the path here
    networks:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      # Router: Main App
      - "traefik.http.routers.rustfs.rule=Host(`files.$DOMAINNAME_J`)"
      - "traefik.http.routers.rustfs.entrypoints=websecure"
      - "traefik.http.routers.rustfs.tls=true"
      - "traefik.http.routers.rustfs.tls.certresolver=letsencrypt"
      - "traefik.http.routers.rustfs.service=rustfs"
      # Service: Main App
      - "traefik.http.services.rustfs.loadbalancer.server.port=9000"
      # Router: Console (subdomain)
      - "traefik.http.routers.rustfs-console.rule=Host(`console.files.$DOMAINNAME_J`)"
      - "traefik.http.routers.rustfs-console.entrypoints=websecure"
      - "traefik.http.routers.rustfs-console.tls=true"
      - "traefik.http.routers.rustfs-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.rustfs-console.service=rustfs-console"
      # Service: Console
      - "traefik.http.services.rustfs-console.loadbalancer.server.port=9001"
      # Middleware: Disable buffering / large uploads
      - "traefik.http.middlewares.rustfs-buffering.buffering.maxRequestBodyBytes=0"
      - "traefik.http.middlewares.rustfs-buffering.buffering.memRequestBodyBytes=0"
      - "traefik.http.middlewares.rustfs-buffering.buffering.maxResponseBodyBytes=0"
      # Apply middleware
      - "traefik.http.routers.rustfs.middlewares=middlewares-ipwhitelist@file,rustfs-buffering@docker"
      - "traefik.http.routers.rustfs-console.middlewares=rustfs-buffering@docker"
