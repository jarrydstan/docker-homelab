services:
  # Sonarr - TV Shows Management
  # Set url_base in sonarr settings if using PathPrefix
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    security_opt:
      - no-new-privileges:true
    restart: "unless-stopped"
    # profiles: ["media", "arrs", "all"]
    networks:
      frontend:
        ipv4_address: 192.168.12.232
      backend:
        ipv4_address: 192.168.13.232
    # ports:
    # - "8989:8989"
    volumes:
      - $DOCKERDIR/appdata/sonarr/config:/config
      - $DATADIR:/media
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr-rtr.entrypoints=websecure"
      - "traefik.http.routers.sonarr-rtr.rule=Host(`sonarr.local.$DOMAINNAME_NA`) || Host(`sonarr.$DOMAINNAME_NA`)"
      - "traefik.http.routers.sonarr-rtr.service=sonarr-svc"
      - "traefik.http.services.sonarr-svc.loadBalancer.server.port=8989"
      # - "traefik."
