services:
  flaresolverr:
    image: flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    networks:
      - backend
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=$TZ
    restart: unless-stopped
