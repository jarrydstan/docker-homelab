services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    shm_size: '256m'
    ports:
      - "2424:22"
    hostname: 'gitlab'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.$DOMAINNAME_J'
        gitlab_rails['gitlab_shell_ssh_port'] = 2424
        gitlab_rails['lfs_enabled'] = true
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
    volumes:
      - $APPDIR/gitlab/config:/etc/gitlab
      - $APPDIR/gitlab/logs:/var/log/gitlab
      - $APPDIR/gitlab/data:/var/opt/gitlab
    networks:
      - frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitlab-rtr.rule=Host(`gitlab.$DOMAINNAME_J`)"
      - "traefik.http.routers.gitlab-rtr.entrypoints=websecure"
      - "traefik.http.routers.gitlab-rtr.service=gitlab-svc"
      - "traefik.http.services.gitlab-svc.loadbalancer.server.port=80"