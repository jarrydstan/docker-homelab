services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v1.12.0 #
    container_name: mealie
    networks:
      - frontend
    restart: always
    # ports:
    #   - "9925:9000" #
    # deploy:
    #   resources:
    #     limits:
    #       memory: 1000M #
    volumes:
      - $DOCKERDIR/appdata/mealie/:/app/data/
    environment:
      # Set Backend ENV Variables Here
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      TZ: $TZ
      MAX_WORKERS: 1
      WEB_CONCURRENCY: 1
      BASE_URL: https://recipe.$DOMAINNAME_NA
      SMTP_HOST: protonmail-bridge
      SMTP_PORT: 25
      SMTP_FROM_NAME: Mealie
      SMTP_AUTH_STRATEGY: TLS
      SMTP_FROM_EMAIL: mealie@$DOMAINNAME_NA
      SMTP_USER: $SMTP_USER
      SMTP_PASSWORD: $SMTP_PASS
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mealie-rtr.rule=Host(`recipe.$DOMAINNAME_NA`)"
      - "traefik.http.routers.mealie-rtr.entrypoints=websecure"
      - "traefik.http.routers.mealie-rtr.middlewares=chain-lan-only@file"
      - "traefik.http.routers.mealie-rtr.service=mealie-svc"
      - "traefik.http.services.mealie-svc.loadBalancer.server.port=9000"
